<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usain Bot</title>
  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 32px;
    }

    header {
      text-align: center;
    }

    header .emoji {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #f0f0f0;
    }

    header p {
      margin-top: 8px;
      font-size: 15px;
      color: #555;
      letter-spacing: 0.5px;
    }

    nav {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
      min-width: 180px;
      justify-content: center;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-calendario {
      background: #e0e0e0;
      color: #0d0d0d;
    }

    .btn-estado {
      background: #0f2e1a;
      color: #5dba7c;
      border: 2px solid #1f5e35;
    }

    .btn-estado:hover {
      box-shadow: 0 8px 24px rgba(0,100,0,0.25);
    }

    footer {
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    <div class="emoji">🤖</div>
    <h1>Usain Bot</h1>
  </header>

  <nav>
    <a class="btn btn-calendario" href="/ironman703-calendario/index.html">
      📅 Calendario
    </a>
    <a class="btn btn-estado" href="pmc-ironman703/index.html">
      📈 Estado
    </a>
  </nav>


</body>
</html>
